repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--strict]
        files: ^(src|scripts)/
        additional_dependencies:
          - PySide6-stubs
          - sqlalchemy[mypy]>=2.0.50
          - alembic>=1.18.4
          - argon2-cffi>=25.1.0
          - keyring>=25.7.0
          - cryptography