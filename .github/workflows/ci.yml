name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Qt system dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libglib2.0-0 libxkbcommon0 libdbus-1-3

      - run: uv sync

      - run: uv run ruff check .

      - run: uv run ruff format --check .

      - run: uv run mypy src/ scripts/ tests/

      - run: uv run pytest
        env:
          QT_QPA_PLATFORM: offscreen
